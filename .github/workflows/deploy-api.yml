# PHILOSOPHY Workflows / Releases (trunk-based): main → staging, tag <product>-api-v* →
# that product's production. Alembic runs as the Fly release_command over the direct
# 5432 DATABASE_MIGRATION_URL (Key ruling #4) — NOT a CI step. All secrets/app names
# carry the org `the777incident`; the Fly apps themselves are created on infra day.
name: Deploy API
on:
  push:
    branches: [main] # → staging
    tags: ["*-api-v*"] # <product>-api-v* → production
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      products: ${{ steps.filter.outputs.changes }}
      has-fly-token: ${{ steps.secret-gate.outputs.has-fly-token }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            template: ['products/_template/api/**', 'packages/**']
            demo: ['products/demo/api/**', 'packages/**']
      # `secrets` isn't readable in a job-level `if`, so surface the gate as an output:
      # until FLY_API_TOKEN is configured (real infra day), deploy SKIPS green instead
      # of failing against the placeholder Fly apps.
      - name: Secret gate
        id: secret-gate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: echo "has-fly-token=$([[ -n "$FLY_API_TOKEN" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
  deploy:
    needs: changes
    if: ${{ needs.changes.outputs.products != '[]' && needs.changes.outputs.has-fly-token == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        product: ${{ fromJSON(needs.changes.outputs.products) }}
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy (staging on main, production on tag)
        working-directory: products/${{ matrix.product == 'template' && '_template' || matrix.product }}/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }} # PLACEHOLDER secret
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            flyctl deploy -c fly.production.toml --remote-only
          else
            flyctl deploy -c fly.staging.toml --remote-only
          fi
