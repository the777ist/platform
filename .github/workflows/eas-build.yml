# PHILOSOPHY Workflows: store builds ONLY for native changes (JS-only goes via
# eas-update.yml OTA). Relies on the committed hoisted node-linker
# (pnpm-workspace.yaml `nodeLinker: hoisted`) AND the root package.json
# `packageManager` field — the eas-cli pnpm-workspace detection workaround.
name: EAS Build
on:
  workflow_dispatch:
    inputs:
      product: { description: "product token (e.g. template, demo)", required: true }
      profile: { description: "EAS build profile", required: true, default: "production" }
  push:
    tags: ["*-app-v*"] # <product>-app-v* → store build
jobs:
  # `secrets` isn't readable in a job-level `if` — surface the gate as an output. A tag
  # push without EXPO_TOKEN (placeholder infra) SKIPS green; an explicit dispatch still
  # runs and fails loudly (a requested build cannot happen without the token).
  gate:
    runs-on: ubuntu-latest
    outputs:
      has-expo-token: ${{ steps.secret-gate.outputs.has-expo-token }}
    steps:
      - name: Secret gate
        id: secret-gate
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: echo "has-expo-token=$([[ -n "$EXPO_TOKEN" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
  build:
    needs: gate
    if: ${{ github.event_name == 'workflow_dispatch' || needs.gate.outputs.has-expo-token == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile # honours pnpm-workspace.yaml `nodeLinker: hoisted` (pnpm 11)
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }} # PLACEHOLDER secret
      - name: Resolve product token (from tag on tag-push)
        id: tag
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "product=${GITHUB_REF_NAME%%-app-v*}" >> "$GITHUB_OUTPUT"
      - name: EAS build
        # dispatch input wins; on a tag push, parse `<product>` from the `<product>-app-v*` tag.
        # `template` maps to the on-disk `_template` dir (the literal product token vs path).
        working-directory: products/${{ (github.event.inputs.product || steps.tag.outputs.product) == 'template' && '_template' || (github.event.inputs.product || steps.tag.outputs.product) }}/app
        run: eas build --non-interactive --profile "${{ github.event.inputs.profile || 'production' }}"
