# PHILOSOPHY Releases: mobile = OTA for JS-only changes. main push affecting a
# product's app → `eas update --channel staging`; tag <product>-ota-v* → production.
# Channels are EXACTLY staging/production. OTA only reaches installed builds because
# app.config.ts sets updates.url + a runtimeVersion policy (projectId alone delivers
# nothing) — cross-reference the Phase 2/8 app.config.ts.
name: EAS Update (OTA)
on:
  push:
    branches: [main] # JS-only OTA → staging channel
    tags: ["*-ota-v*"] # <product>-ota-v* → production channel
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      products: ${{ steps.filter.outputs.changes }}
      has-expo-token: ${{ steps.secret-gate.outputs.has-expo-token }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            template: ['products/_template/app/**', 'packages/**']
            demo: ['products/demo/app/**', 'packages/**']
      # `secrets` isn't readable in a job-level `if`, so surface the gate as an output:
      # until EXPO_TOKEN is configured (real infra day), the OTA job SKIPS green instead
      # of failing against the placeholder EAS project.
      - name: Secret gate
        id: secret-gate
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: echo "has-expo-token=$([[ -n "$EXPO_TOKEN" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
  update:
    needs: changes
    if: ${{ needs.changes.outputs.products != '[]' && needs.changes.outputs.has-expo-token == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        product: ${{ fromJSON(needs.changes.outputs.products) }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with: { eas-version: latest, token: "${{ secrets.EXPO_TOKEN }}" } # PLACEHOLDER secret
      - name: OTA (staging on main, production on tag)
        working-directory: products/${{ matrix.product == 'template' && '_template' || matrix.product }}/app
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            eas update --channel production --non-interactive --auto
          else
            eas update --channel staging --non-interactive --auto
          fi
